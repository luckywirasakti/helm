<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#09090b"/>
  
  <!-- Server chassis -->
  <rect x="96" y="80" width="320" height="352" rx="32" fill="#18181b" stroke="#27272a" stroke-width="4"/>
  
  <!-- Server front panel -->
  <rect x="112" y="96" width="288" height="320" rx="24" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
  
  <!-- Slot indicator LEDs -->
  <circle cx="228" cy="128" r="12" fill="#22c55e" opacity="0.9"/>
  <circle cx="284" cy="128" r="12" fill="#22c55e" opacity="0.9"/>
  
  <!-- Drive bay 1 -->
  <rect x="140" y="168" width="232" height="36" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
  <rect x="156" y="176" width="200" height="20" rx="4" fill="#3f3f46"/>
  <circle cx="168" cy="186" r="4" fill="#60a5fa"/>
  
  <!-- Drive bay 2 -->
  <rect x="140" y="220" width="232" height="36" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
  <rect x="156" y="228" width="160" height="20" rx="4" fill="#3f3f46"/>
  <circle cx="168" cy="238" r="4" fill="#22c55e"/>
  
  <!-- Drive bay 3 -->
  <rect x="140" y="272" width="232" height="36" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
  <rect x="156" y="280" width="120" height="20" rx="4" fill="#3f3f46"/>
  <circle cx="168" cy="290" r="4" fill="#f59e0b"/>
  
  <!-- Drive bay 4 -->
  <rect x="140" y="324" width="232" height="36" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
  <rect x="156" y="332" width="180" height="20" rx="4" fill="#3f3f46"/>
  <circle cx="168" cy="342" r="4" fill="#60a5fa"/>
  
  <!-- Activity LEDs on top -->
  <rect x="320" y="136" width="16" height="6" rx="3" fill="#22c55e" opacity="0.6"/>
  <rect x="346" y="136" width="16" height="6" rx="3" fill="#60a5fa" opacity="0.6"/>
  <rect x="372" y="136" width="16" height="6" rx="3" fill="#22c55e" opacity="0.3"/>
</svg>
